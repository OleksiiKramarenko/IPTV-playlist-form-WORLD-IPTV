name: Update IPTV Playlist

on:
  schedule:
    - cron: '0 * * * *'   # каждый час
  workflow_dispatch:        # ручной запуск из интерфейса GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest playlist
        env:
          TG_CHANNEL: ${{ vars.TG_CHANNEL }}
        run: python fetch_playlist.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u
          git diff --cached --quiet || git commit -m "Update playlist $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
